plugins {
    id 'fabric-loom' version '1.10-SNAPSHOT'
    id 'java'
}

version = "1.0.0"
group = "com.claudebot"

repositories {
    mavenCentral()
    maven { url "https://maven.fabricmc.net/" }
    // Baritone releases
    maven { url "https://repo.nerdvision.net/repository/maven-public/" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.5"
    mappings "net.fabricmc:yarn:1.21.5+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.18.5"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.128.2+1.21.5"

    // Baritone API - use local jar
    modCompileOnly files("libs/baritone-api-fabric-1.14.0.jar")
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
